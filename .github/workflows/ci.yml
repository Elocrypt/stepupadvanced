name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: windows-latest
    env:
      VINTAGE_STORY: ${{ secrets.VINTAGE_STORY_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # The mod links against Vintage Story DLLs that aren't redistributable
      # via CI. To enable the full build, make the VS install accessible to
      # the runner (private artifact or self-hosted) and set the
      # VINTAGE_STORY_PATH secret.

      # - name: Build main project
      #   env:
      #     VINTAGE_STORY: ${{ secrets.VINTAGE_STORY_PATH }}
      #   run: dotnet build src/StepUpAdvanced/StepUpAdvanced.csproj -c Release --nologo

      - name: Build & run tests
        if: ${{ env.VINTAGE_STORY != '' }}
        run: dotnet test tests/StepUpAdvanced.Tests/StepUpAdvanced.Tests.csproj -c Release --nologo --logger "console;verbosity=normal"

      - name: Skip (Vintage Story DLL path not configured)
        if: ${{ env.VINTAGE_STORY == '' }}
        run: |
          echo "::warning::Skipping Build & Test because VINTAGE_STORY_PATH is not configured. The project references non-redistributable Vintage Story DLLs."
