name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to package (e.g. 1.4.0)'
        required: true
        type: string

permissions:
  contents: write
  
jobs:
  release:
    name: Build & Publish Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $version = $env:GITHUB_REF -replace '^refs/tags/v', ''
          } else {
            $version = '${{ github.event.inputs.version }}'
          }
          if (-not $version) {
            throw "Could not determine version from tag or input."
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Resolved version: $version"

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $content = Get-Content CHANGELOG.md -Raw

          # Match the section for this version up to (but not including) the next heading
          $pattern = "(?s)## \[$([regex]::Escape($version))\][^\n]*\n(.+?)(?=\n## \[|\z)"
          $match = [regex]::Match($content, $pattern)

          if ($match.Success) {
            $notes = $match.Groups[1].Value.Trim()
            Write-Host "Extracted release notes for v$version"
          } else {
            $notes = "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
            Write-Host "Warning: No CHANGELOG section found for v$version — using fallback."
          }

          $notes | Out-File -FilePath release_notes.md -Encoding utf8
          Write-Host "--- Notes preview ---"
          Write-Host $notes

      # Requires Vintage Story DLLs accessible to the runner.
      # Wire VINTAGE_STORY to a private artifact or self-hosted runner to enable.
      - name: Package release
        id: package
        if: ${{ env.VINTAGE_STORY != '' }}
        shell: pwsh
        env:
          VINTAGE_STORY: ${{ secrets.VINTAGE_STORY_PATH }}
        run: |
          ./build/package.ps1 -Version '${{ steps.version.outputs.version }}'
          "built=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: StepUp Advanced v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: ${{ steps.package.outputs.built == 'true' && format('build/dist/StepUpAdvanced_{0}.zip', steps.version.outputs.version) || '' }}
          draft: false
          prerelease: false
