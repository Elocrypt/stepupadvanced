name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # The mod links against Vintage Story DLLs that aren't redistributable
      # via CI. Until a properly-licensed install is available to GitHub
      # Actions runners, this workflow only verifies that the test project
      # itself compiles and runs (it does not link against VS types directly).
      #
      # When you have a VS install accessible in CI (e.g. via a private
      # artifact, a self-hosted runner, or a stripped reference assemblies
      # package), uncomment the main-project build below and point
      # VINTAGE_STORY at it.

      # - name: Build main project
      #   env:
      #     VINTAGE_STORY: ${{ env.VINTAGE_STORY_PATH }}
      #   run: dotnet build src/StepUpAdvanced/StepUpAdvanced.csproj -c Release --nologo

      - name: Build solution (no-op until VS DLLs are available in CI)
        run: |
          echo "Skipping main project build until Vintage Story DLLs are accessible in CI."
          echo "See ci.yml comments for the path to enable full builds."

  # Placeholder for once VS DLLs are reachable. Tests will target the
  # framework-free Domain/ layer added in Phase 5, which can be unit-tested
  # without VS dependencies if structured correctly.
